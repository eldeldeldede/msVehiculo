server:
  port: 8081

spring:
  application:
    name: msVehiculo
  datasource:
    url: jdbc:mysql://localhost:3306/db_vehiculos
    username: root
    password: 
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

springdoc:
  api-docs:
    enabled: true
    version: openapi_3_0
  swagger-ui:
    enabled: true